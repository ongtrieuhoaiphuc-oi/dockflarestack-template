name: smoke-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-unit:
    name: Lint + Unit + Bootstrap smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          # Repo chua co package-lock.json -> tat auto cache cua setup-node
          # (tranh loi 'Dependencies lock file is not found'). Cache thu cong o duoi.
          package-manager-cache: false

      - name: Cache npm (~/.npm) theo hash package.json
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install deps
        run: npm install

      - name: Syntax check tat ca .mjs
        run: |
          echo "== kiem tra syntax cac file .mjs =="
          for f in $(find scripts test services -name '*.mjs'); do
            echo "  check $f"
            node --check "$f"
          done

      - name: Smoke test (base64, readonly-guard, bootstrap)
        run: node test/smoke.mjs

      - name: Cache apt (shellcheck)
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-shellcheck-${{ runner.os }}

      - name: Shellcheck entrypoints
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          echo "== shellcheck entrypoints =="
          shellcheck services/rclone/entrypoint.sh services/ttyd/entrypoint.sh services/litestream/entrypoint.sh || true

  compose-validate:
    name: Validate docker-compose + profiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Cache npm (~/.npm) theo hash package.json
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install deps
        run: npm install

      - name: Bootstrap voi env test (core only)
        run: |
          cat > .env <<'EOF'
          STACK_ID=ci-smoke
          DOMAIN=ci.example.com
          DOCKER_VOLUMES_DIR=.docker-volumes
          DOCKFLARE_CF_API_TOKEN=dummy
          DOCKFLARE_CF_ACCOUNT_ID=dummy
          DOCKFLARE_TUNNEL_NAME=${STACK_ID}
          DOCKFLARE_HOSTNAME=dockflare.${DOMAIN}
          EOF
          node scripts/bootstrap.mjs
          echo "== .env.resolved =="
          cat .env.resolved

      - name: Validate compose config (core)
        run: |
          docker compose --env-file .env.resolved -f core/docker-compose.yml config > /dev/null
          echo "compose config core: OK"

      - name: Bootstrap + validate (full profiles)
        run: |
          cat > .env <<'EOF'
          STACK_ID=ci-smoke
          DOMAIN=ci.example.com
          DOCKER_VOLUMES_DIR=.docker-volumes
          DOCKFLARE_CF_API_TOKEN=dummy
          DOCKFLARE_TUNNEL_NAME=${STACK_ID}
          DOCKFLARE_HOSTNAME=dockflare.${DOMAIN}
          DOZZLE_HOSTNAME=logs.${DOMAIN}
          FILEBROWSER_HOSTNAME=files.${DOMAIN}
          TTYD_HOSTNAME=ssh.${DOMAIN}
          COORDINATOR_ENABLE=true
          RTDB_URL=https://x.firebaseio.com
          RTDB_SERVICE_ACCOUNT=base64:e30=
          COORDINATOR_READONLY_FLAG_PATH=.docker-volumes/.readonly
          RCLONE_ENABLE=true
          RCLONE_REMOTE=r
          RCLONE_PATH=${STACK_ID}
          LITESTREAM_ENABLE=true
          LITESTREAM_DB_PATH=.docker-volumes/app.db
          LITESTREAM_S3_ENDPOINT=https://s3.example
          LITESTREAM_S3_BUCKET=b
          LITESTREAM_S3_ACCESS_KEY_ID=k
          LITESTREAM_S3_SECRET_ACCESS_KEY=s
          DOZZLE_ENABLE=true
          DOZZLE_PASSWORD=pw
          FILEBROWSER_ENABLE=true
          FILEBROWSER_ADMIN_PASSWORD=pw
          TTYD_ENABLE=true
          TTYD_CREDENTIAL=admin:secret
          TAILSCALE_ENABLE=true
          TAILSCALE_TAGS=tag:container
          TS_AUTHKEY=dummy
          EOF
          node scripts/bootstrap.mjs
          echo "== COMPOSE_PROFILES =="
          grep COMPOSE_PROFILES .env.resolved
          docker compose --env-file .env.resolved -f core/docker-compose.yml config > /dev/null
          echo "compose config full: OK"

  build-images:
    name: Build service images (buildx + gha cache)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build coordinator (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: ./services/coordinator
          push: false
          load: true
          tags: dockflarestack/coordinator:ci
          cache-from: type=gha,scope=coordinator
          cache-to: type=gha,mode=max,scope=coordinator

      - name: Build rclone (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: ./services/rclone
          push: false
          load: true
          tags: dockflarestack/rclone:ci
          cache-from: type=gha,scope=rclone
          cache-to: type=gha,mode=max,scope=rclone

      - name: Build ttyd (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: ./services/ttyd
          push: false
          load: true
          tags: dockflarestack/ttyd:ci
          cache-from: type=gha,scope=ttyd
          cache-to: type=gha,mode=max,scope=ttyd
