name: deploy
on:
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: 'So phut giu stack song, 1-350'
        required: false
        default: '50'
permissions: { contents: read }
jobs:
  deploy:
    name: Deploy stack qua Cloudflare Tunnel
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '24', package-manager-cache: false }
      - uses: docker/setup-buildx-action@v4
      - uses: actions/cache@v5
        with: { path: ~/.npm, key: "npm-${{ runner.os }}-${{ hashFiles('package.json') }}" }
      - run: npm install
      - uses: actions/cache@v5
        with:
          path: .docker-volumes
          key: docker-volumes-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: docker-volumes-${{ github.ref_name }}-
      - name: Tao .env
        env: { ENV_CONTENT: "${{ secrets.BOOTSTRAP_ENV_FILE }}" }
        run: |
          test -n "$ENV_CONTENT" || { echo '[ERROR] BOOTSTRAP_ENV_FILE rong'; exit 1; }
          printf '%s\n' "$ENV_CONTENT" > .env
      - name: Bootstrap
        run: node scripts/bootstrap.mjs
      - name: Pre-init Dozzle + Filebrowser
        run: |
          set -euo pipefail
          get(){ ENV_KEY="$1" node --input-type=module -e 'import fs from "node:fs";import dotenv from "dotenv";let e=dotenv.parse(fs.readFileSync(".env.resolved"));process.stdout.write(e[process.env.ENV_KEY]||"")'; }
          VOL="$(get DOCKER_VOLUMES_DIR)"; mkdir -p "$VOL"/{dockflare,dozzle,filebrowser,redis}
          if [ "$(get DOZZLE_ENABLE)" = true ] && [ "${DOZZLE_AUTH_PROVIDER:-$(get DOZZLE_AUTH_PROVIDER)}" = simple ]; then
            docker run --rm amir20/dozzle:latest generate "$(get DOZZLE_USERNAME || true)" --password "$(get DOZZLE_PASSWORD)" --name "${DOZZLE_USERNAME:-admin}" > "$VOL/dozzle/users.yml"
            test -s "$VOL/dozzle/users.yml"
          fi
          if [ "$(get FILEBROWSER_ENABLE)" = true ]; then
            sudo chown -R 1000:1000 "$VOL/filebrowser"
            DB="$VOL/filebrowser/filebrowser.db"
            if [ ! -s "$DB" ]; then
              docker run --rm --user 1000:1000 -v "$VOL/filebrowser:/database" filebrowser/filebrowser:latest config init --database /database/filebrowser.db
              docker run --rm --user 1000:1000 -v "$VOL/filebrowser:/database" filebrowser/filebrowser:latest users add admin "$(get FILEBROWSER_ADMIN_PASSWORD)" --database /database/filebrowser.db --perm.admin
            else
              docker run --rm --user 1000:1000 -v "$VOL/filebrowser:/database" filebrowser/filebrowser:latest users update admin --password "$(get FILEBROWSER_ADMIN_PASSWORD)" --database /database/filebrowser.db
            fi
            test -s "$DB"
          fi
      - name: Validate + up
        run: |
          docker compose --project-directory . --env-file .env.resolved -f core/docker-compose.yml config >/dev/null
          docker compose --project-directory . --env-file .env.resolved -f core/docker-compose.yml up -d --build
      - name: Runtime health gate
        run: |
          set -euo pipefail
          for i in $(seq 1 18); do
            bad=$(docker compose --project-directory . --env-file .env.resolved -f core/docker-compose.yml ps --format '{{.Name}} {{.State}}' | awk '$2=="restarting" || $2=="exited"{print $1}')
            [ -z "$bad" ] && break
            [ "$i" -lt 18 ] || { for c in $bad; do docker logs --tail 50 "$c" 2>&1; done; exit 1; }
            sleep 5
          done
          docker compose --project-directory . --env-file .env.resolved -f core/docker-compose.yml ps
      - name: Keep-alive
        env: { KEEP_MIN: "${{ github.event.inputs.keep_alive_minutes }}" }
        run: |
          set -euo pipefail
          case "$KEEP_MIN" in ''|*[!0-9]*) exit 1;; esac
          [ "$KEEP_MIN" -ge 1 ] && [ "$KEEP_MIN" -le 350 ] || exit 1
          HOST=$(ENV_KEY=DOCKFLARE_HOSTNAME node --input-type=module -e 'import fs from "node:fs";import dotenv from "dotenv";process.stdout.write(dotenv.parse(fs.readFileSync(".env.resolved"))[process.env.ENV_KEY])')
          END=$(( $(date +%s)+KEEP_MIN*60 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            bad=$(docker compose --project-directory . --env-file .env.resolved -f core/docker-compose.yml ps --format '{{.Name}} {{.State}}' | awk '$2=="restarting" || $2=="exited"{print $1}')
            if [ -n "$bad" ]; then for c in $bad; do docker logs --tail 50 "$c" 2>&1; done; exit 1; fi
            curl -fsS -m 10 "https://$HOST" >/dev/null || true
            sleep 60
          done
      - name: Cleanup
        if: always()
        run: docker compose --project-directory . --env-file .env.resolved -f core/docker-compose.yml down || true
