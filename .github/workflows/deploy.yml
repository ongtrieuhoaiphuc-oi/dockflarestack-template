name: deploy

# Deploy that: bring up stack, expose service qua Cloudflare Tunnel theo DOMAIN.
# Chay thu cong (workflow_dispatch). Can cau hinh GitHub Secrets (xem docs/10).
# CACHE (dat o tang yml): npm (~/.npm), docker buildx (gha), .docker-volumes.
on:
  workflow_dispatch:
    inputs:
      profiles:
        description: 'Module bat them (ngoai core), cach nhau dau phay. Vd: dozzle,filebrowser,ttyd'
        required: false
        default: 'dozzle,filebrowser,ttyd'
      keep_alive_minutes:
        description: 'So phut giu stack song (keep-alive) truoc khi job ket thuc. Toi da ~350 (job GH gioi han 6h).'
        required: false
        default: '50'

jobs:
  deploy:
    name: Deploy stack qua Cloudflare Tunnel
    runs-on: ubuntu-latest
    # Job GitHub-hosted toi da 6h. Timeout hoi lon hon keep-alive de step cleanup chay.
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Setup Buildx (cho docker layer cache)
        uses: docker/setup-buildx-action@v3

      - name: Cache npm (~/.npm) theo hash package.json
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install deps
        run: npm install

      - name: Cache .docker-volumes (warm-start)
        uses: actions/cache@v5
        with:
          path: .docker-volumes
          key: docker-volumes-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            docker-volumes-${{ github.ref_name }}-
            docker-volumes-

      - name: Build service images (buildx + gha cache)
        run: |
          echo "== build service co Dockerfile voi cache gha =="
          for svc in coordinator rclone ttyd; do
            if [ -f "services/$svc/Dockerfile" ]; then
              echo "  build $svc"
              docker buildx build \
                --cache-from type=gha,scope=$svc \
                --cache-to type=gha,mode=max,scope=$svc \
                --load -t dockflarestack/$svc:deploy "services/$svc"
            fi
          done

      - name: Tao .env tu GitHub Secrets
        env:
          STACK_ID: ${{ secrets.STACK_ID }}
          DOMAIN: ${{ secrets.DOMAIN }}
          CF_API_TOKEN: ${{ secrets.DOCKFLARE_CF_API_TOKEN }}
          RTDB_URL: ${{ secrets.RTDB_URL }}
          RTDB_SA_B64: ${{ secrets.RTDB_SERVICE_ACCOUNT_B64 }}
          DOZZLE_PASSWORD: ${{ secrets.DOZZLE_PASSWORD }}
          FILEBROWSER_ADMIN_PASSWORD: ${{ secrets.FILEBROWSER_ADMIN_PASSWORD }}
          TTYD_CREDENTIAL: ${{ secrets.TTYD_CREDENTIAL }}
          ACCESS_ALLOWED_EMAILS: ${{ secrets.ACCESS_ALLOWED_EMAILS }}
          ENABLED_PROFILES: ${{ github.event.inputs.profiles }}
        run: |
          set -e
          echo "== tao .env =="
          {
            echo "STACK_ID=${STACK_ID}"
            echo "DOMAIN=${DOMAIN}"
            echo "DOCKER_VOLUMES_DIR=.docker-volumes"
            echo "DOCKFLARE_CF_API_TOKEN=${CF_API_TOKEN}"
            echo "DOCKFLARE_TUNNEL_NAME=\${STACK_ID}"
            echo "DOCKFLARE_HOSTNAME=dockflare.\${DOMAIN}"
            echo "DOZZLE_HOSTNAME=logs.\${DOMAIN}"
            echo "FILEBROWSER_HOSTNAME=files.\${DOMAIN}"
            echo "TTYD_HOSTNAME=ssh.\${DOMAIN}"
            echo "ACCESS_PROTECT=true"
            echo "ACCESS_ALLOWED_EMAILS=${ACCESS_ALLOWED_EMAILS}"
            echo "RTDB_URL=${RTDB_URL}"
            echo "RTDB_SERVICE_ACCOUNT=base64:${RTDB_SA_B64}"
            case ",${ENABLED_PROFILES}," in *,dozzle,*) echo "DOZZLE_ENABLE=true"; echo "DOZZLE_PASSWORD=${DOZZLE_PASSWORD}";; esac
            case ",${ENABLED_PROFILES}," in *,filebrowser,*) echo "FILEBROWSER_ENABLE=true"; echo "FILEBROWSER_ADMIN_PASSWORD=${FILEBROWSER_ADMIN_PASSWORD}";; esac
            case ",${ENABLED_PROFILES}," in *,ttyd,*) echo "TTYD_ENABLE=true"; echo "TTYD_CREDENTIAL=${TTYD_CREDENTIAL}";; esac
          } > .env
          echo "da tao .env (khong in noi dung vi chua secret)"

      - name: Bootstrap (resolve + validate + fail-closed)
        run: |
          node scripts/bootstrap.mjs
          echo "== profiles =="
          grep COMPOSE_PROFILES .env.resolved

      - name: Validate compose config
        run: docker compose --env-file .env.resolved -f core/docker-compose.yml config > /dev/null

      - name: Bring up stack
        run: |
          set -a; . ./.env.resolved; set +a
          docker compose --env-file .env.resolved -f core/docker-compose.yml up -d --build
          echo "== trang thai container =="
          docker compose --env-file .env.resolved -f core/docker-compose.yml ps

      - name: Cho DockFlare tao tunnel (retry)
        run: |
          echo "== cho DockFlare dang ky tunnel/DNS (toi da 90s) =="
          for i in $(seq 1 18); do
            if docker compose --env-file .env.resolved -f core/docker-compose.yml logs dockflare 2>&1 | grep -qi 'tunnel'; then
              echo "DockFlare da xu ly tunnel"; break
            fi
            sleep 5
          done
          docker compose --env-file .env.resolved -f core/docker-compose.yml ps

      - name: In cac URL service da expose
        run: |
          set -a; . ./.env.resolved; set +a
          echo "DockFlare UI : https://${DOCKFLARE_HOSTNAME}"
          grep -q 'DOZZLE_ENABLE=true' .env.resolved && echo "Dozzle       : https://${DOZZLE_HOSTNAME}" || true
          grep -q 'FILEBROWSER_ENABLE=true' .env.resolved && echo "Filebrowser  : https://${FILEBROWSER_HOSTNAME}" || true
          grep -q 'TTYD_ENABLE=true' .env.resolved && echo "ttyd/WebSSH  : https://${TTYD_HOSTNAME}" || true

      # ------------------------------------------------------------------
      # KEEP-ALIVE: giu stack song de truy cap service qua tunnel.
      # GitHub-hosted runner ephemeral -> khi step ket thuc, container tat,
      # tunnel dong. Step nay loop heartbeat toi keep_alive_minutes phut,
      # in trang thai container + thu tunnel dinh ky. Neu bat coordinator,
      # day cung la khoang overlap de handover sang phien ke tiep.
      # De chay BEN VUNG lau dai -> dung self-hosted runner (xem docs/10).
      # ------------------------------------------------------------------
      - name: Keep-alive (giu stack song)
        env:
          KEEP_MIN: ${{ github.event.inputs.keep_alive_minutes }}
        run: |
          set -a; . ./.env.resolved; set +a
          MINUTES="${KEEP_MIN:-50}"
          END=$(( $(date +%s) + MINUTES * 60 ))
          echo "== keep-alive ${MINUTES} phut (toi $(date -u -d @${END} +%H:%M:%SZ)) =="
          i=0
          while [ "$(date +%s)" -lt "$END" ]; do
            i=$((i+1))
            echo "--- heartbeat #$i @ $(date -u +%H:%M:%SZ) ---"
            docker compose --env-file .env.resolved -f core/docker-compose.yml ps --format '{{.Name}} {{.State}}' || true
            # thu tunnel (best-effort)
            curl -sS -m 10 -o /dev/null -w "tunnel HTTP %{http_code}\n" "https://${DOCKFLARE_HOSTNAME}" 2>/dev/null || echo "tunnel chua san sang"
            # neu container core chet -> thoat som de job do (bao loi)
            if ! docker compose --env-file .env.resolved -f core/docker-compose.yml ps --status running --format '{{.Name}}' | grep -q dockflare; then
              echo "[ERROR] DockFlare core khong con chay -> dung keep-alive"; exit 1
            fi
            sleep 60
          done
          echo "== het thoi gian keep-alive, chuan bi dong stack =="

      - name: Flush + shutdown (cleanup)
        if: always()
        run: |
          if [ -f .env.resolved ]; then
            echo "== flush volume (neu rclone bat) + dong stack =="
            docker compose --env-file .env.resolved -f core/docker-compose.yml logs --tail 30 || true
            docker compose --env-file .env.resolved -f core/docker-compose.yml down || true
          fi
