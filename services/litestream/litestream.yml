# litestream.yml - replicate SQLite realtime len S3 Supabase.
# Bien ${LITESTREAM_*} do compose truyen vao (tu .env.resolved).
# Chi PRIMARY replicate (coordinator dam bao). Restore force theo generation o entrypoint.
dbs:
  - path: ${LITESTREAM_DB_PATH}
    replicas:
      - type: s3
        endpoint: ${LITESTREAM_S3_ENDPOINT}
        bucket: ${LITESTREAM_S3_BUCKET}
        access-key-id: ${LITESTREAM_S3_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_S3_SECRET_ACCESS_KEY}
        # force-path-style tu auto-detect (v0.5+) cho Supabase S3
